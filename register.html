<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — CareerAI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
</head>

<body>
  <!-- Continuous Shifting Color Background -->
  <div class="animated-bg"></div>

  <nav class="navbar">
    <a href="/" class="logo" style="text-decoration:none;">🤖 CareerAI</a>
    <div class="nav-links"><a href="/login">Login</a></div>
  </nav>

  <div class="container" style="display:flex; justify-content:center; padding-top:5rem;">
    <div class="glass-card" style="width:100%; max-width:420px;">
      <h2 style="margin-bottom:1.5rem; text-align:center;">Create Account 🚀</h2>

      {% if error %}
      <div class="alert-error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/register">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="John Doe" required />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@email.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Min 6 characters" required />
        </div>
        <button type="submit" class="btn-primary" style="width:100%; margin-top:0.5rem;">
          Create Account
        </button>
      </form>
      <p style="text-align:center; margin-top:1rem; color:var(--text-secondary); font-size:0.9rem;">
        Already registered? <a href="/login" style="color:var(--accent-cyan); font-weight:600;">Login here</a>
      </p>
    </div>
  </div>
</body>

</html>
