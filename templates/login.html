<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — CareerAI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo" style="text-decoration:none;">🤖 CareerAI</a>
    <div class="nav-links"><a href="/register">Register</a></div>
  </nav>

  <div class="container" style="display:flex; justify-content:center; padding-top:5rem;">
    <div class="glass-card" style="width:100%; max-width:420px;">
      <h2 style="margin-bottom:1.5rem; text-align:center;">Welcome Back 👋</h2>

      {% if error %}
        <div class="alert-error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@email.com" required/>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn-primary" style="width:100%; margin-top:0.5rem;">
          Login
        </button>
      </form>
      <p style="text-align:center; margin-top:1rem; color:var(--text-secondary); font-size:0.9rem;">
        No account? <a href="/register" style="color:var(--accent);">Register here</a>
      </p>
    </div>
  </div>
</body>
</html>
